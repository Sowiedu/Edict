name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify schema is up to date
        run: |
          npm run generate-schema
          git diff --exit-code -- schema/edict.schema.json

      - name: Run tests
        run: npm test

      - name: Verify all examples compile
        run: |
          node --import tsx -e "
          import { handleCompile } from './src/mcp/handlers.js';
          import { readdirSync, readFileSync } from 'fs';
          const dir = './examples';
          const files = readdirSync(dir).filter(f => f.endsWith('.edict.json')).sort();
          let pass = 0;
          for (const f of files) {
            const ast = JSON.parse(readFileSync(dir+'/'+f, 'utf-8'));
            const r = await handleCompile(ast);
            console.log(r.ok ? '✓' : '✗', f);
            if (!r.ok) { console.error('Errors:', JSON.stringify(r.errors)); process.exit(1); }
            pass++;
          }
          console.log(pass + '/' + files.length + ' examples compile');
          "
