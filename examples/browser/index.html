<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edict — Browser Compilation Example</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            background: #0d1117; color: #c9d1d9;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 2rem;
        }
        .container { max-width: 720px; width: 100%; }
        h1 { font-size: 1.4rem; margin-bottom: 1.5rem; color: #58a6ff; }
        .panel {
            background: #161b22; border: 1px solid #30363d;
            border-radius: 8px; padding: 1.2rem; margin-bottom: 1rem;
        }
        .label { font-size: 0.75rem; color: #8b949e; text-transform: uppercase; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-size: 0.85rem; line-height: 1.6; }
        .ok { color: #3fb950; }
        .err { color: #f85149; }
        .info { color: #8b949e; }
        #status { font-size: 0.9rem; padding: 0.8rem; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h1>⚡ Edict Browser Compilation</h1>

    <div class="panel">
        <div class="label">Edict Program (JSON AST)</div>
        <pre id="source"></pre>
    </div>

    <div class="panel" id="status">Initializing…</div>

    <div class="panel" id="z3-panel" style="display:none">
        <div class="label">Z3 Contract Verification</div>
        <pre id="z3-result"></pre>
    </div>

    <div class="panel" id="compile-panel" style="display:none">
        <div class="label">Compilation</div>
        <pre id="compile-result"></pre>
    </div>

    <div class="panel" id="run-panel" style="display:none">
        <div class="label">Execution</div>
        <pre id="run-result"></pre>
    </div>
</div>

<!-- Z3 WASM loader — must load before the Edict bundle (sets globalThis.initZ3) -->
<script src="../../dist/z3-built.js"></script>

<script type="module">
// Edict Browser Compilation Demo
// Serve this directory via HTTP (e.g. `npx serve .` from the repo root).
// ESM imports don't work from file:// due to CORS restrictions.
import {
    compileBrowserFull,
    compileBrowser,
    initEdictBrowser,
    isZ3Initialized,
    runBrowserDirect,
} from '../../dist/browser-full.bundle.js';

// The Edict program: fn absolute(x: Int) -> Int { pre: x >= 0; post: result >= 0; if x < 0 then -x else x }
// This demonstrates contract verification: Z3 proves the postcondition holds.
const program = {
    kind: 'module',
    id: 'mod-browser-demo',
    name: 'browser_demo',
    imports: [],
    definitions: [{
        kind: 'fn',
        id: 'fn-main',
        name: 'main',
        params: [],
        effects: ['io'],
        returnType: { kind: 'basic', name: 'Int' },
        contracts: [],
        body: [
            {
                kind: 'call',
                id: 'call-print',
                fn: { kind: 'ident', id: 'id-print', name: 'print' },
                args: [{ kind: 'literal', id: 'lit-hello', value: 'Hello from the browser!' }],
            },
            {
                kind: 'call',
                id: 'call-absolute',
                fn: { kind: 'ident', id: 'id-absolute', name: 'absolute' },
                args: [{ kind: 'literal', id: 'lit-neg', value: -7 }],
            },
        ],
    }, {
        kind: 'fn',
        id: 'fn-absolute',
        name: 'absolute',
        params: [{ kind: 'param', id: 'p-x', name: 'x', type: { kind: 'basic', name: 'Int' } }],
        effects: ['pure'],
        returnType: { kind: 'basic', name: 'Int' },
        contracts: [
            {
                kind: 'post',
                id: 'post-nonneg',
                condition: {
                    kind: 'binop', id: 'cond-gte', op: '>=',
                    left: { kind: 'ident', id: 'id-result', name: 'result' },
                    right: { kind: 'literal', id: 'lit-zero', value: 0 },
                },
            },
        ],
        body: [{
            kind: 'if',
            id: 'if-neg',
            condition: {
                kind: 'binop', id: 'cmp-lt', op: '<',
                left: { kind: 'ident', id: 'id-x-cmp', name: 'x' },
                right: { kind: 'literal', id: 'lit-0-cmp', value: 0 },
            },
            then: [{
                kind: 'unop', id: 'neg-x', op: '-',
                operand: { kind: 'ident', id: 'id-x-neg', name: 'x' },
            }],
            else: [{ kind: 'ident', id: 'id-x-ret', name: 'x' }],
        }],
    }],
};

// Display the source program
document.getElementById('source').textContent = JSON.stringify(program, null, 2);

const status = document.getElementById('status');
const z3Panel = document.getElementById('z3-panel');
const z3Result = document.getElementById('z3-result');
const compilePanel = document.getElementById('compile-panel');
const compileResult = document.getElementById('compile-result');
const runPanel = document.getElementById('run-panel');
const runResult = document.getElementById('run-result');

try {
    // Step 0: Initialize Z3 (loads ~32MB WASM)
    status.textContent = 'Loading Z3 WASM (~32MB)…';
    const z3t0 = performance.now();
    const z3Init = await initEdictBrowser();
    const z3Ms = (performance.now() - z3t0).toFixed(0);

    z3Panel.style.display = 'block';
    if (z3Init.ok) {
        z3Result.innerHTML =
            `<span class="ok">✓ Z3 initialized</span> <span class="info">(${z3Ms}ms)</span>\n` +
            `<span class="info">Contract verification: enabled</span>`;
    } else {
        z3Result.innerHTML =
            `<span class="err">✗ Z3 init failed: ${z3Init.error}</span>\n` +
            `<span class="info">Falling back to compilation without contract verification</span>`;
    }

    // Step 1: Compile (with Z3 contract verification if available)
    status.textContent = isZ3Initialized()
        ? 'Compiling with contract verification…'
        : 'Compiling (no Z3)…';
    const t0 = performance.now();
    const compiled = isZ3Initialized()
        ? await compileBrowserFull(program)
        : compileBrowser(program);
    const compileMs = (performance.now() - t0).toFixed(1);

    compilePanel.style.display = 'block';

    if (!compiled.ok) {
        compileResult.innerHTML = `<span class="err">✗ Compilation failed</span>\n${JSON.stringify(compiled.errors, null, 2)}`;
        status.innerHTML = '<span class="err">Compilation failed</span>';
        throw new Error('stop');
    }

    const coverageInfo = compiled.coverage
        ? `\n<span class="info">Contracts verified: ${compiled.coverage.contractsVerified ?? 0} proven, ` +
          `${compiled.coverage.contractsFailed ?? 0} failed</span>`
        : '';

    compileResult.innerHTML =
        `<span class="ok">✓ Compiled successfully</span> <span class="info">(${compileMs}ms)</span>\n` +
        `<span class="info">WASM size: ${compiled.wasm.length} bytes</span>` +
        coverageInfo;

    // Step 2: Execute
    status.textContent = 'Executing WASM…';
    const t1 = performance.now();
    const result = await runBrowserDirect(compiled.wasm);
    const runMs = (performance.now() - t1).toFixed(1);

    runPanel.style.display = 'block';

    if (result.exitCode !== 0) {
        runResult.innerHTML = `<span class="err">✗ Execution failed (exit code ${result.exitCode})</span>\n${result.output}`;
        status.innerHTML = '<span class="err">Execution failed</span>';
    } else {
        runResult.innerHTML =
            `<span class="ok">✓ Exit code: ${result.exitCode}</span> <span class="info">(${runMs}ms)</span>\n` +
            `<span class="ok">Return value: ${result.returnValue}</span>\n` +
            (result.output ? `<span class="info">Output: ${result.output}</span>` : '') +
            (result.heapUsed ? `\n<span class="info">Heap used: ${result.heapUsed} bytes</span>` : '');

        const z3Status = isZ3Initialized() ? ' with Z3 contract verification' : '';
        status.innerHTML = `<span class="ok">✓ Complete — compiled${z3Status} and executed in the browser</span>`;
    }
} catch (e) {
    if (e.message !== 'stop') {
        status.innerHTML = `<span class="err">Error: ${e.message}</span>`;
        console.error(e);
    }
}
</script>
</body>
</html>
